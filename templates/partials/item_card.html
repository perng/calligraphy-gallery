<article class="item-card">
  <a href="/items/{{ item.id }}" class="card-thumb">
    {% if item.cover_image_id %}
      <img src="/media/images/{{ item.cover_image_id }}" alt="{{ item.display_title }}" loading="lazy">
    {% else %}
      <span class="placeholder">No image</span>
    {% endif %}
  </a>
  <div class="card-body">
    <p class="card-person">{{ item.primary_person_name or "Unknown person" }}</p>
    <h3><a href="/items/{{ item.id }}">{{ item.display_title }}</a></h3>
    <p class="card-meta">Views: {{ item.view_count }}{% if item.last_viewed_at %} · {{ item.last_viewed_at[:10] }}{% endif %}</p>
  </div>
</article>
